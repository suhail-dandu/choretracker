{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-md-6 text-center">
    <div style="font-size:5rem;">😕</div>
    <h2 class="mt-3">You're not in a family yet!</h2>
    <p class="text-muted fw-700">Ask your parent for an invite code, or create a new family.</p>
    <div class="d-flex gap-3 justify-content-center mt-4">
      <a href="{% url 'accounts:join_family' %}" class="btn btn-ct-primary btn-lg">Join a Family</a>
      <a href="{% url 'accounts:register_family' %}" class="btn btn-ct-success btn-lg">Create Family</a>
    </div>
  </div>
</div>
{% endblock %}
