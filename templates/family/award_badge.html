{% extends "base.html" %}
{% block title %}Award Badge — ChoreTracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7">
    <div class="text-center mb-4">
      <div style="font-size:3rem;">{{ kid.avatar }}</div>
      <h2>Award a Badge to {{ kid.display_name }}</h2>
    </div>
    <div class="ct-card p-4">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3 mb-4">
          {% for value, label in badge_choices %}
          <div class="col-sm-6 col-md-4">
            <label class="d-block">
              <input type="radio" name="badge_type" value="{{ value }}" class="d-none badge-radio"
                {% if value in existing_badges %}disabled{% endif %}>
              <div class="p-3 rounded-3 text-center fw-700 badge-option
                {% if value in existing_badges %}opacity-50{% endif %}"
                style="background:var(--ct-yellow-lt);border:2px solid var(--ct-yellow);cursor:pointer;transition:all .2s">
                {{ label }}
                {% if value in existing_badges %}<div class="text-muted small">(already earned)</div>{% endif %}
              </div>
            </label>
          </div>
          {% endfor %}
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-ct-warning flex-grow-1 btn-lg">🏆 Award Badge!</button>
          <a href="{% url 'accounts:kid_profile' kid.pk %}" class="btn btn-outline-secondary btn-lg"
             style="border-radius:.9rem;font-weight:700">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.querySelectorAll('.badge-radio').forEach(radio => {
  radio.addEventListener('change', () => {
    document.querySelectorAll('.badge-option').forEach(o => o.style.borderColor = 'var(--ct-yellow)');
    if (radio.checked) radio.closest('label').querySelector('.badge-option').style.borderColor = 'var(--ct-purple)';
  });
});
</script>
{% endblock %}
