{% extends "base.html" %}
{% block title %}Remove Child — ChoreTracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-5">
    <div class="ct-card p-4 text-center">
      <div style="font-size:3rem;">{{ kid.avatar }}</div>
      <h3 class="mt-3">Remove {{ kid.display_name }}?</h3>
      <p class="text-muted fw-700">They will lose access to the family. Their data will be kept.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-ct-danger btn-lg">Yes, Remove</button>
        <a href="{% url 'family:overview' %}" class="btn btn-outline-secondary btn-lg" style="border-radius:.9rem;font-weight:700">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
